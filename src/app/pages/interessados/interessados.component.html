<app-lt-sys-menu></app-lt-sys-menu>
<table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

  <!--- Note that these columns can be defined in any order.
        The actual rendered columns are set as a property on the row definition" -->

  <!-- Position Column -->
  <ng-container matColumnDef="nomeCompleto">
    <th mat-header-cell *matHeaderCellDef> Nome Completo </th>
    <td mat-cell *matCellDef="let element"> {{element.pessoa.nomeCompleto}} </td>
  </ng-container>

  <!-- Name Column -->
  <ng-container matColumnDef="dataNascto">
    <th mat-header-cell *matHeaderCellDef> Data de Nascimento </th>
    <td mat-cell *matCellDef="let element"> {{element.pessoa.dataNascto}} </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
